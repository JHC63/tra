<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編組QR Code</title>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <style>
        :root { 
            --bg-color: #f3f6f9; --surface: #ffffff; --text-primary: #1e293b; 
            --text-secondary: #64748b; --accent: #3b82f6; --success: #10b981; 
            --danger: #ef4444; --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.08);
            --radius-md: 12px; --radius-lg: 20px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; display: flex; justify-content: center; min-height: 100vh; background-color: var(--bg-color); padding: 40px 20px; margin: 0; color: var(--text-primary); }
        
        .header-link {
            position: fixed;
            top: 24px;
            right: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            background-color: var(--surface);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 30px;
            text-decoration: none;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .header-link:hover {
            border-color: var(--accent);
            background-color: var(--accent);
            color: var(--surface);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.25);
            transform: translateY(-2px);
        }
        .header-link svg { width: 18px; height: 18px; transition: transform 0.3s ease; }
        .header-link:hover svg { transform: scale(1.1); }

        .container { background-color: var(--surface); padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 1000px; text-align: center; }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 30px; letter-spacing: -0.5px; background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .controls-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 30px; padding: 24px; background: #f8fafc; border-radius: var(--radius-md); border: 1px solid #e2e8f0; position: relative; }
        .input-group input { padding: 18px 24px; font-size: 28px; width: 280px; text-align: center; border: 2px solid #cbd5e1; border-radius: var(--radius-md); transition: all 0.3s ease; outline: none; font-family: 'Courier New', Courier, monospace; font-weight: 700; color: var(--accent); background: var(--surface); }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59,130,246,0.15); transform: translateY(-2px); }
        .input-group input::placeholder { color: #94a3b8; font-weight: 500; font-size: 18px; }
        
        .toggle-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; font-size: 16px; font-weight: 600; color: var(--text-secondary); background-color: var(--surface); border: 2px solid #cbd5e1; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; opacity: 0; visibility: hidden; transform: translateY(10px); position: absolute; pointer-events: none; }
        .toggle-btn.visible { opacity: 1; visibility: visible; transform: translateY(0); position: relative; pointer-events: auto; }
        .toggle-btn.active { background-color: var(--text-primary); color: var(--surface); border-color: var(--text-primary); box-shadow: 0 4px 12px rgba(30,41,59,0.2); }
        .toggle-btn svg { width: 18px; height: 18px; transition: transform 0.4s ease; }
        .toggle-btn.active svg { transform: rotate(180deg); }
        
        .status-panel { min-height: 28px; margin-bottom: 10px; }
        .group-name { font-size: 18px; color: var(--success); font-weight: 700; padding: 8px 16px; background: rgba(16,185,129,0.1); border-radius: 20px; display: inline-block; }
        .error-msg { color: var(--danger); font-size: 18px; font-weight: 700; padding: 8px 16px; background: rgba(239,68,68,0.1); border-radius: 20px; display: inline-block; }
        .wait-msg { color: var(--text-secondary); font-size: 18px; font-weight: 600; }
        
        .qrcode-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-top: 30px; }
        .qrcode-item { background-color: var(--surface); border-radius: var(--radius-md); padding: 24px 16px; box-shadow: var(--shadow-sm); text-align: center; border: 1px solid #f1f5f9; transition: transform 0.3s ease, box-shadow 0.3s ease; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards; opacity: 0; transform: scale(0.95); }
        .qrcode-item:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .text-content { font-family: 'Courier New', Courier, monospace; font-size: 18px; margin-bottom: 16px; font-weight: 800; color: var(--text-primary); letter-spacing: 1px; }
        .car-number { font-weight: 700; font-size: 14px; margin-top: 16px; color: var(--accent); background: rgba(59,130,246,0.1); padding: 6px 12px; border-radius: 12px; display: inline-block; }
        .qr-canvas { display: flex; justify-content: center; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        @keyframes popIn { to { opacity: 1; transform: scale(1); } }

        /* 第二組專屬樣式 */
        #group2 { display: none; margin-top: 40px; border-top: 2px dashed #cbd5e1; padding-top: 40px; }

        @media (max-width: 768px) {
            body { padding-top: 80px; } 
            .header-link { top: 16px; right: 16px; padding: 8px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <a href="https://jhc63.github.io/tra/NRSeat.html" class="header-link" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
        自由座管理
    </a>

    <div class="container">
        <h1>編組QR Code</h1>
        
        <div id="group1">
            <div class="controls-wrapper">
                <div class="input-group">
                    <input type="text" inputmode="numeric" id="inputNumber" placeholder="請輸入第一組車號" autocomplete="off">
                </div>
                <div class="status-panel">
                    <div id="statusMessage" class="wait-msg">等待輸入...</div>
                </div>
                <button id="toggleReverseBtn" class="toggle-btn" onclick="toggleDirection(1)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 10v12"></path><path d="M11 18l-4 4-4-4"></path>
                        <path d="M17 14V2"></path><path d="M21 6l-4-4-4 4"></path>
                    </svg>
                    編組首尾互換
                </button>
            </div>
            <div id="qrcodeDisplay" class="qrcode-container"></div>
        </div>

        <div id="group2">
            <div class="controls-wrapper">
                <div class="input-group">
                    <input type="text" inputmode="numeric" id="inputNumber2" placeholder="請輸入第二組 500 型車號" autocomplete="off">
                </div>
                <div class="status-panel">
                    <div id="statusMessage2" class="wait-msg">等待輸入...</div>
                </div>
                <button id="toggleReverseBtn2" class="toggle-btn" onclick="toggleDirection(2)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 10v12"></path><path d="M11 18l-4 4-4-4"></path>
                        <path d="M17 14V2"></path><path d="M21 6l-4-4-4 4"></path>
                    </svg>
                    編組首尾互換
                </button>
            </div>
            <div id="qrcodeDisplay2" class="qrcode-container"></div>
        </div>
    </div>

    <script>
        // 狀態隔離 (State Isolation)
        const AppState = { rawString: '', isReversed: false, currentRuleKey: null };
        const AppState2 = { rawString: '', isReversed: false, currentRuleKey: null };
        
        const REVERSIBLE_TYPES = ['500', '700', '800', '900'];

        const TrainFormationStrategies = {
            '500': (n) => ({ name: '500型 (注意EMC/EM方向)', cars: [`45EMC${n}`, `45EP${n}`, `45ET${n}`, `45EM${n}`] }),
            '700': (n) => ({ name: '700型', cars: [`45EMC${n}`, `45EP${n}`, `40ET${n}`, `45EM${n}`, `45EM${n+1}`, `40ET${n+1}`, `45EP${n+1}`, `45EMC${n+1}`] }),
            '800': (n) => ({ name: '800型', cars: [`45ED${n}`, `50EMA${n}`, `50EP${n}`, `50EMB${n}`, `50EMB${n+1}`, `50EP${n+1}`, `50EMA${n+1}`, `45ED${n+1}`] }),
            '900': (n) => ({ name: '900型', cars: [`50ED${n}`, `50EM${n}`, `45EP${n}`, `50EM${n+1}`, `45EM${n+2}`, `45EP${n+1}`, `50EM${n+3}`, `45EP${n+2}`, `50EM${n+4}`, `50ED${n+1}`] }),
            '3000': (n) => ({ name: '3000型', cars: [`45ED${n}`, `45EM${n}`, `45EP${n}`, `45EM${n+1}`, `45ET${n}`, `45EM${n+2}`, `50EP${n+1}`, `45EM${n+3}`, `45EM${n+4}`, `45EP${n+2}`, `45EM${n+5}`, `45ED${n+1}`] }),
            'TAROKO': (n) => { 
                const l2 = n % 100, h = n - l2 + l2 * 2, a = h - (h % 100) + (h % 100) - 1, s = n - l2 + l2 + 1, y = s - (s % 100) + (s % 100) * 2, c = y - (y % 100) + (y % 100) - 1;
                return { name: '太魯閣 (TEMU1000)', cars: [`40TED${n}`, `40TEM${a}`, `45TEP${n}`, `40TEM${h}`, `40TEM${y}`, `45TEP${s}`, `40TEM${c}`, `40TED${s}`] };
            },
            'PUYUMA': (n) => { 
                const l2 = n % 100, h = n - l2 + l2 * 2, a = h - (h % 100) + (h % 100) - 1, s = n - l2 + l2 + 1, y = s - (s % 100) + (s % 100) * 2, c = y - (y % 100) + (y % 100) - 1;
                return { name: '普悠瑪 (TEMU2000)', cars: [`40TED${n}`, `40TEMA${a}`, `45TEP${n}`, `40TEMB${h}`, `40TEMB${y}`, `45TEP${s}`, `40TEMA${c}`, `40TED${s}`] };
            }
        };

        function detectTrainRule(rawNum) {
            if (rawNum >= 9001 && rawNum <= 9996) return '900';
            if (rawNum >= 3001 && rawNum <= 3994) return '3000';
            if (rawNum >= 2001 && rawNum <= 2948) return 'PUYUMA';
            if (rawNum >= 1001 && rawNum <= 1948) return 'TAROKO';
            if (rawNum >= 801 && rawNum <= 898) return '800';
            if (rawNum >= 701 && rawNum <= 798) return '700';
            if (rawNum >= 501 && rawNum <= 599) return '500';
            return null; 
        }

        /**
         * 核心渲染邏輯抽象化 (Core Render Engine)
         * 包含防撞檢測 (Collision Detection) 與 500型例外處理 (Routing Bypass)
         */
        function processRender(state, displayEl, statusEl, toggleBtnEl, startIndex = 0, mustBe500 = false, conflictValue = null) {
            // 【Bug 修復】：當輸入長度不足或為空時，強制重置 RuleKey，避免狀態殘留
            if (!state.rawString || state.rawString.length < 3) {
                displayEl.innerHTML = '';
                statusEl.className = 'wait-msg';
                statusEl.textContent = '等待完整輸入...';
                toggleBtnEl.classList.remove('visible');
                state.currentRuleKey = null; // 關鍵修復點
                return;
            }

            let rawNum = parseInt(state.rawString, 10);
            
            // 防撞檢測：互斥比對
            if (conflictValue !== null && rawNum === conflictValue) {
                displayEl.innerHTML = '';
                statusEl.className = 'error-msg';
                statusEl.textContent = `輸入無效：第二組不可與第一組 [${conflictValue}] 重複`;
                toggleBtnEl.classList.remove('visible');
                state.currentRuleKey = null; // 發生錯誤時同步清除狀態
                return;
            }

            const ruleKey = detectTrainRule(rawNum);
            state.currentRuleKey = ruleKey;
            
            // 防呆攔截：若指定僅限 500 型，其他車型拋錯
            if (mustBe500 && ruleKey !== '500') {
                displayEl.innerHTML = '';
                statusEl.className = 'error-msg';
                statusEl.textContent = `輸入 [${rawNum}] 無效：此欄位僅限 500 型`;
                toggleBtnEl.classList.remove('visible');
                return;
            }

            if (!ruleKey || !TrainFormationStrategies[ruleKey]) {
                displayEl.innerHTML = '';
                statusEl.className = 'error-msg';
                statusEl.textContent = `輸入 [${rawNum}] 無效：不屬於任何車型`;
                toggleBtnEl.classList.remove('visible');
                return;
            }

            // 500型繞過偶數降階機制，維持原車號
            const baseNum = (ruleKey === '500') ? rawNum : (rawNum % 2 === 0 ? rawNum - 1 : rawNum);
            const isAutoCorrected = rawNum !== baseNum;

            if (REVERSIBLE_TYPES.includes(ruleKey)) {
                toggleBtnEl.classList.add('visible');
            } else {
                toggleBtnEl.classList.remove('visible');
                state.isReversed = false; 
            }

            if (state.isReversed) {
                toggleBtnEl.classList.add('active');
            } else {
                toggleBtnEl.classList.remove('active');
            }

            const { name, cars } = TrainFormationStrategies[ruleKey](baseNum);
            
            let finalCars = [...cars];
            let reverseStatusText = state.isReversed ? ' [已互換]' : '';
            if (state.isReversed) {
                finalCars.reverse();
            }

            statusEl.className = 'group-name';
            let correctMsg = isAutoCorrected ? `` : ``;
            statusEl.textContent = `${name}${correctMsg}${reverseStatusText}`;

            displayEl.innerHTML = '';
            const fragment = document.createDocumentFragment();

            finalCars.forEach((text, index) => {
                const item = document.createElement('div');
                item.className = 'qrcode-item';
                item.style.animationDelay = `${index * 0.05}s`; 
                
                item.innerHTML = `
                    <div class="text-content">${text}</div>
                    <div class="qr-canvas"></div>
                    <div class="car-number">第 ${startIndex + index + 1} 車</div>
                `;
                
                new QRCode(item.querySelector('.qr-canvas'), {
                    text: text, width: 150, height: 150, correctLevel: QRCode.CorrectLevel.M 
                });
                
                fragment.appendChild(item);
            });

            displayEl.appendChild(fragment);
        }

        // 渲染管線總成
        function renderPipeline() {
            // 處理第一組 (主編組)
            const display1 = document.getElementById('qrcodeDisplay');
            const status1 = document.getElementById('statusMessage');
            const btn1 = document.getElementById('toggleReverseBtn');
            processRender(AppState, display1, status1, btn1, 0, false, null);
            
            // 根據第一組結果動態決策第二組狀態
            const group2 = document.getElementById('group2');
            
            // 若第一組的 RuleKey 為 500 才顯示第二組；否則執行徹底清空 (Garbage Collection)
            if (AppState.currentRuleKey === '500') {
                group2.style.display = 'block';
                const display2 = document.getElementById('qrcodeDisplay2');
                const status2 = document.getElementById('statusMessage2');
                const btn2 = document.getElementById('toggleReverseBtn2');
                
                // 提取第一組的值作為互斥驗證標準
                const firstGroupValue = AppState.rawString.length >= 3 ? parseInt(AppState.rawString, 10) : null;
                
                // 第二組設定 startIndex 為 4，並傳入 firstGroupValue 進行防撞檢測
                processRender(AppState2, display2, status2, btn2, 4, true, firstGroupValue);
            } else {
                // 狀態重置與 DOM 清除 (State Cleanup)
                group2.style.display = 'none';
                AppState2.rawString = '';
                AppState2.isReversed = false;
                AppState2.currentRuleKey = null;
                document.getElementById('inputNumber2').value = '';
                document.getElementById('qrcodeDisplay2').innerHTML = '';
            }
        }

        function debounce(func, delay) {
            let timer;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        const debouncedRender = debounce(renderPipeline, 300);

        // 第一組事件綁定 (State Diffing 優化)
        document.getElementById('inputNumber').addEventListener('input', (e) => {
            const sanitizedValue = e.target.value.replace(/\D/g, '');
            if (e.target.value !== sanitizedValue) {
                e.target.value = sanitizedValue;
            }
            
            if (AppState.rawString !== sanitizedValue) {
                AppState.rawString = sanitizedValue;
                AppState.isReversed = false; 
                debouncedRender();
            }
        });

        // 第二組事件綁定 (State Diffing 優化)
        document.getElementById('inputNumber2').addEventListener('input', (e) => {
            const sanitizedValue = e.target.value.replace(/\D/g, '');
            if (e.target.value !== sanitizedValue) {
                e.target.value = sanitizedValue;
            }
            
            if (AppState2.rawString !== sanitizedValue) {
                AppState2.rawString = sanitizedValue;
                AppState2.isReversed = false; 
                debouncedRender();
            }
        });

        // 首尾互換控制器 (Event Delegation)
        window.toggleDirection = function(groupNum) {
            if (groupNum === 1) {
                AppState.isReversed = !AppState.isReversed;
            } else {
                AppState2.isReversed = !AppState2.isReversed;
            }
            renderPipeline(); 
        };
    </script>
</body>
</html>
